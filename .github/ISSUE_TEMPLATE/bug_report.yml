name: Bug report
description: Something in GeoWire doesn't work as expected
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal steps or code. Include the request and the `meta` block from the response if you have it.
      render: shell
  - type: dropdown
    id: interface
    attributes:
      label: Interface
      options: [MCP, REST API, CLI, SDK]
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: GeoWire version
      placeholder: "0.1.0"
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "Node 22.x, Windows 11 / macOS / Linux, Docker?"
