name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to do that GeoWire doesn't support yet?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? API shape, config, tool, etc.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
